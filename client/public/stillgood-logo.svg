<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72" fill="none">
  <defs>
    <linearGradient id="sgBg" x1="8" y1="8" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2f6e5d"/>
      <stop offset="0.55" stop-color="#519d87"/>
      <stop offset="1" stop-color="#6ab59f"/>
    </linearGradient>
    <linearGradient id="sgFruit" x1="28" y1="24" x2="44" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff7dd"/>
      <stop offset="1" stop-color="#ffe9b0"/>
    </linearGradient>
    <radialGradient id="sgShine" cx="32" cy="34" r="9" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- rounded square background -->
  <rect x="4" y="4" width="64" height="64" rx="18" fill="url(#sgBg)"/>

  <!-- decorative speckles -->
  <circle cx="12" cy="14" r="1.2" fill="#fff2c1" opacity="0.55"/>
  <circle cx="60" cy="16" r="1" fill="#fff2c1" opacity="0.4"/>
  <circle cx="58" cy="58" r="1.3" fill="#fff2c1" opacity="0.45"/>
  <circle cx="14" cy="56" r="1" fill="#fff2c1" opacity="0.4"/>

  <!-- pear body (off-centre, slightly plump on the bottom) -->
  <path d="M36 24 C30.2 24 27 27.5 27 32.3 C27 35 28.3 36.8 28.3 39.4 C28.3 43.1 25.6 45.6 25.6 50.5 C25.6 56 30 59.6 36 59.6 C42 59.6 46.4 56 46.4 50.5 C46.4 45.6 43.7 43.1 43.7 39.4 C43.7 36.8 45 35 45 32.3 C45 27.5 41.8 24 36 24 Z"
        fill="url(#sgFruit)"/>

  <!-- shine on pear -->
  <ellipse cx="32" cy="34" rx="4.5" ry="6.5" fill="url(#sgShine)"/>

  <!-- leaf (warm tomato pop) -->
  <path d="M36 24 C34 19 37.2 14.5 43.5 13.8 C44.5 17.8 42 22.6 36 24 Z"
        fill="#e05a3b"/>
  <path d="M38 21.5 C40 20 42 17.8 43 15.5"
        stroke="#ffd7c7" stroke-width="0.8" stroke-linecap="round"/>

  <!-- stem -->
  <path d="M35.7 24 L34.9 20.2" stroke="#4a3b2a" stroke-width="1.6" stroke-linecap="round"/>

  <!-- embedded checkmark — the "still good" signal -->
  <path d="M30.5 44.5 L34.5 48.5 L42 40.5"
        stroke="#2f6e5d" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- honey sparkle accent -->
  <g opacity="0.95">
    <circle cx="52" cy="30" r="2.1" fill="#f3ae3d"/>
    <circle cx="52" cy="30" r="4.8" fill="#f3ae3d" opacity="0.28"/>
    <path d="M52 25 L52 27 M52 33 L52 35 M47 30 L49 30 M55 30 L57 30"
          stroke="#f3ae3d" stroke-width="1.2" stroke-linecap="round" opacity="0.75"/>
  </g>
</svg>
